apiVersion: templates.gatekeeper.sh/v1beta1
kind: ConstraintTemplate
metadata:
  name: k8srunasnonrootuser
spec:
  crd:
    spec:
      names:
        kind: K8sRunAsNonRootUser
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srunasnonrootuser

        violation[{"msg": msg}] {
          not input.review.object.spec.securityContext.runAsNonRoot
          msg := sprintf("%v must set securityContext.runAsNonRoot=true.", [input.review.object.metadata.name])
        }