apiVersion: v1
kind: Pod
metadata:
  name: pod-secure-3
  namespace: audit-zone
spec:
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: nginx
      image: nginx
      securityContext:
        allowPrivilegeEscalation: false
        runAsUser: 101
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
